name: release

# Tag-triggered release build. Pushing a v* tag (e.g. v1.0.0) builds Release on
# Linux + Windows, runs the full gate (tests + pluginval) so a release only ships
# from green, packages the VST3 + Standalone per OS, and attaches the zips to a
# GitHub Release — so people can download and run the synth without a build setup.
#
# workflow_dispatch runs the same build + packaging (uploads run artifacts) but
# does NOT publish a Release — handy for a dry run.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git unzip xvfb \
            libasound2-dev libjack-jackd2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxext-dev \
            libcurl4-openssl-dev libwebkit2gtk-4.1-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-

      # Release build. LTO on for a shipped binary (CI build-test keeps it off for speed).
      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DVASYNTH_BUILD_TESTS=ON -DVASYNTH_ENABLE_LTO=ON -DVASYNTH_COPY_PLUGIN=OFF
          -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build (Standalone + VST3 + tests)
        run: cmake --build build --config Release -j 4

      # Gate: a release only ships from a green tree (mirrors build-test.yml).
      - name: Test (Linux, headless under Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --test-dir build -C Release --output-on-failure -j 4

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure -j 4

      - name: pluginval (Linux, strictness 8)
        if: runner.os == 'Linux'
        run: |
          curl -sSL -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
          unzip -o pluginval.zip
          chmod +x pluginval
          xvfb-run -a ./pluginval --strictness-level 8 \
            --validate "build/VASynth_artefacts/Release/VST3/synth.vst3"

      # ---- package: VST3 bundle + Standalone binary + docs -> one zip per OS ----
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p pkg
          cp -r build/VASynth_artefacts/Release/VST3/synth.vst3 pkg/
          cp build/VASynth_artefacts/Release/Standalone/* pkg/
          cp README.md CHANGELOG.md LICENSE pkg/
          (cd pkg && zip -r "../synth-${{ github.ref_name }}-Linux.zip" .)

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg | Out-Null
          Copy-Item -Recurse build/VASynth_artefacts/Release/VST3/synth.vst3 pkg/
          Copy-Item build/VASynth_artefacts/Release/Standalone/* pkg/
          Copy-Item README.md,CHANGELOG.md,LICENSE pkg/
          Compress-Archive -Path pkg/* -DestinationPath "synth-${{ github.ref_name }}-Windows.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: synth-${{ runner.os }}
          if-no-files-found: error
          path: synth-*.zip

  release:
    name: publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to create a Release
    steps:
      - uses: actions/checkout@v4

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          pattern: synth-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "synth ${{ github.ref_name }}" \
            --notes "Downloadable VST3 + Standalone builds for Linux and Windows. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for the full feature list.

          **Install:** unzip and drop \`synth.vst3\` into your VST3 folder (\`~/.vst3\` on Linux, \`%COMMONPROGRAMFILES%\\VST3\` on Windows), or run the \`synth\` standalone directly." \
            synth-*.zip
